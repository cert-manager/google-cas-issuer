# The container registry used for google-cas-issuer images by default.
# This can include path prefixes (e.g. "artifactory.example.com/docker").
# +docs:property
imageRegistry: quay.io

# The repository namespace used for google-cas-issuer images by default.
# Examples:
# - jetstack
# - cert-manager
# +docs:property
imageNamespace: jetstack

crds:
  # This option decides if the CRDs should be installed
  # as part of the Helm installation.
  enabled: true

  # This option makes it so that the "helm.sh/resource-policy": keep
  # annotation is added to the CRD. This will prevent Helm from uninstalling
  # the CRD when the Helm release is uninstalled.
  # WARNING: when the CRDs are removed, all cert-manager custom resources
  # (Certificates, Issuers, ...) will be removed too by the garbage collector.
  keep: true

# Number of replicas of google-cas-issuer to run.
replicaCount: 1

image:
  # Deprecated: per-component registry prefix.
  #
  # If set, this value is *prepended* to the image repository that the chart would otherwise render.
  # This applies both when `image.repository` is set and when the repository is computed from
  # `imageRegistry` + `imageNamespace` + `image.name`.
  #
  # This can produce "double registry" style references such as
  # `legacy.example.io/quay.io/jetstack/...`. Prefer using the global
  # `imageRegistry`/`imageNamespace` values.
  # +docs:property
  # registry: quay.io

  # The image name for google-cas-issuer.
  # This is used (together with `imageRegistry` and `imageNamespace`) to construct the full
  # image reference.
  # +docs:property
  name: cert-manager-google-cas-issuer

  # Full repository override (takes precedence over `imageRegistry`, `imageNamespace`, and
  # `image.name`).
  # Example: quay.io/jetstack/cert-manager-google-cas-issuer
  # +docs:property
  repository: ""

  # Override the image tag to deploy by setting this variable.
  # If no value is set, the chart's appVersion is used.
  # +docs:property
  # tag: vX.Y.Z

  # Target image digest. Override any tag, if set.
  # For example:
  #   digest: sha256:0e072dddd1f7f8fc8909a2ca6f65e76c5f0d2fcfb8be47935ae3457e8bbceb20
  # +docs:property
  # digest: sha256:...

  # Kubernetes imagePullPolicy on Deployment.
  pullPolicy: IfNotPresent

# Optional secrets used for pulling the google-cas-issuer container image.
imagePullSecrets: []

# Labels to apply to all resources
commonLabels: {}

serviceAccount:
  # Optional annotations to add to the service account
  annotations: {}

app:
  # Verbosity of google-cas-issuer logging.
  logLevel: 1 # 1-5

  # Handle RBAC permissions for approving Google CAS issuer
  # CertificateRequests.
  approval:
    # enabled determines whether the ClusterRole and ClusterRoleBinding for
    # approval is created. You will want to disable this if you are managing
    # approval RBAC elsewhere from this chart, for example if you create them
    # separately for all installed issuers.
    enabled: true

    # subjects is the subject that the approval RBAC permissions will be
    # bound to. Here we are binding them to cert-manager's ServiceAccount so
    # that the default approve all approver has the permissions to do so. You
    # will want to change this subject to approver-policy's ServiceAccount if
    # using that project (recommended).
    #   https://cert-manager.io/docs/projects/approver-policy
    #   name: cert-manager-approver-policy
    #   namespace: cert-manager
    subjects:
    - kind: ServiceAccount
      name: cert-manager
      namespace: cert-manager

  # Number of concurrent worker threads
  maxConcurrentReconciles: 1

  # metrics controls exposing google-cas-issuer metrics.
  metrics:
    # Port for exposing Prometheus metrics on 0.0.0.0 on path '/metrics'.
    port: 9402

# Optional additional annotations to add to the google-cas-issuer Deployment
deploymentAnnotations: {}

# Optional additional annotations to add to the google-cas-issuer Pods
podAnnotations: {}

# Optional additional labels to add to the google-cas-issuer Pods
podLabels: {}

# Kubernetes pod resource requests/limits for google-cas-issuer.
# For example:
#  limits:
#    cpu: 100m
#    memory: 128Mi
#  requests:
#    cpu: 100m
#    memory: 128Mi
resources: {}

# Kubernetes node selector: node labels for pod assignment
# For example:
#  kubernetes.io/os: linux
nodeSelector: {}

# Kubernetes affinity: constraints for pod assignment
# For example:
#  nodeAffinity:
#    requiredDuringSchedulingIgnoredDuringExecution:
#      nodeSelectorTerms:
#      - matchExpressions:
#        - key: foo.bar.com/role
#          operator: In
#          values:
#          - master
affinity: {}

# Kubernetes pod tolerations for google-cas-issuer
# For example:
#  - operator: "Exists"
tolerations: []

# Optional priority class to be used for the google-cas-issuer pods.
priorityClassName: ""

# Pod Security Context.
# For more information, see [Configure a Security Context for a Pod or Container](https://kubernetes.io/docs/tasks/configure-pod-container/security-context/).
# +docs:property
securityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

# Container Security Context to be set on the controller component container.
# For more information, see [Configure a Security Context for a Pod or Container](https://kubernetes.io/docs/tasks/configure-pod-container/security-context/).
# +docs:property
containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true

# Override the "cert-manager-google-cas-issuer.name" value.
# +docs:property
# nameOverride: "my-google-cas-issuer"
